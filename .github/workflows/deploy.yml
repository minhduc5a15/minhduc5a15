name: Deploy portfolio to GitHub Pages

on:
  # Chạy khi push lên nhánh main
  push:
    branches: ['main']
  # Cho phép chạy thủ công từ tab Actions
  workflow_dispatch:
  # Tự động fetch data và deploy lúc 00:00 UTC mỗi ngày
  schedule:
    - cron: '0 0 * * *'

# Cấp quyền đọc ghi cho GITHUB_TOKEN để deploy lên Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Chỉ cho phép một deployment chạy tại một thời điểm
concurrency:
  group: 'pages'
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Fetch GitHub Data
        run: bun run fetch-data
        env:
          GITHUB_TOKEN: ${{ secrets.PAT_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Build project
        run: bun run build
        env:
          # Đánh dấu đang chạy trong môi trường CI để Vite nạp đúng base path
          GITHUB_ACTIONS: true

      - name: Setup GitHub Pages
        uses: actions/configure-pages@v4

      - name: Fix permissions
        run: chmod -c -R +rX ./dist

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
